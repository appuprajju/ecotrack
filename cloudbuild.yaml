steps:
  # 1. Build and tag backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-backend:$COMMIT_SHA'
      - './backend'
    id: 'build-backend'

  # 2. Build and tag frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-frontend:$COMMIT_SHA'
      - './frontend'
    id: 'build-frontend'

  # 3. Push images to GCP Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-backend:$COMMIT_SHA'
    id: 'push-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-frontend:$COMMIT_SHA'
    id: 'push-frontend'

  # 4. Deploy Backend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        cmd="gcloud run deploy ecotrack-backend \
          --image=$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-backend:$COMMIT_SHA \
          --region=$_GCP_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --update-env-vars=NODE_ENV=production,DATABASE_URL=$_DATABASE_URL,JWT_ACCESS_SECRET=$_JWT_ACCESS_SECRET,JWT_REFRESH_SECRET=$_JWT_REFRESH_SECRET,ALLOWED_ORIGINS=$_ALLOWED_ORIGINS"
        if [ -n "$_CLOUD_SQL_INSTANCE" ]; then
          cmd="$$cmd --add-cloudsql-instances=$_CLOUD_SQL_INSTANCE"
        fi
        eval $$cmd
    id: 'deploy-backend'

  # 5. Deploy Frontend to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe ecotrack-backend --region=$_GCP_REGION --format="value(status.url)")
        FRONTEND_URL=$$(gcloud run services describe ecotrack-frontend --region=$_GCP_REGION --format="value(status.url)" 2>/dev/null || echo "")
        # Re-deploy backend with ALLOWED_ORIGINS pointing to the frontend URL
        gcloud run services update ecotrack-backend \
          --region=$_GCP_REGION \
          --update-env-vars=ALLOWED_ORIGINS=$$FRONTEND_URL
        gcloud run deploy ecotrack-frontend \
          --image=$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-frontend:$COMMIT_SHA \
          --region=$_GCP_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --update-env-vars=BACKEND_URL=$$BACKEND_URL
    id: 'deploy-frontend'

images:
  - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-backend:$COMMIT_SHA'
  - '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/$_REGISTRY_NAME/ecotrack-frontend:$COMMIT_SHA'

substitutions:
  _GCP_REGION: 'us-central1'
  _REGISTRY_NAME: 'ecotrack-repo'
  _DATABASE_URL: 'postgresql://postgres:Whitedevil%406320117@db.jegtsqieyebkktqudide.supabase.co:5432/postgres'
  _CLOUD_SQL_INSTANCE: ''
  _JWT_ACCESS_SECRET: 'eco_track_access_secret_key_987654321'
  _JWT_REFRESH_SECRET: 'eco_track_refresh_secret_key_123456789'
  _ALLOWED_ORIGINS: ''

options:
  logging: CLOUD_LOGGING_ONLY
