name: EcoTrack AI Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: | 
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      - name: Run Backend Test Suites
        run: |
          cd backend
          npm run test

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  deploy-to-gcp:
    needs: test-and-verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
         workload_identity_provider: ${{secrets.WIF_PROVIDER}}
         service_account: eco-deployer@ecotrack-499112.iam.gserviceaccount.com

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Set Project
        run: gcloud config set project ${{secrets.GCP_PROJECT_ID}}

      - name: Configure Docker authentication for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Images
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-backend:${{ github.sha }} ./backend
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-frontend:${{ github.sha }} ./frontend
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-backend:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-frontend:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        run: |
          SECRETS_JSON=$(gcloud secrets versions access latest --secret="ecotrack-secrets")
          DATABASE_URL=$(echo "$SECRETS_JSON" | jq -r '.DATABASE_URL')
          JWT_ACCESS_SECRET=$(echo "$SECRETS_JSON" | jq -r '.JWT_ACCESS_SECRET')
          JWT_REFRESH_SECRET=$(echo "$SECRETS_JSON" | jq -r '.JWT_REFRESH_SECRET')
          
          # Auto-correct Supabase pooler username if it is missing the project reference
          if [[ "$DATABASE_URL" == *"pooler.supabase.com"* ]]; then
            if [[ "$DATABASE_URL" == *"//postgres:"* ]]; then
              echo "Correcting direct postgres username for Supabase pooler connection..."
              DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/\/\/postgres:/\/\/postgres.jegtsqieyebkktqudide:/')
            elif [[ "$DATABASE_URL" == *"//postgres.:"* ]]; then
              echo "Correcting incomplete postgres. username for Supabase pooler connection..."
              DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/\/\/postgres\.:/\/\/postgres.jegtsqieyebkktqudide:/')
            fi
          fi
          
          # Mask and print the database connection url safely for debugging
          SAFE_URL=$(echo "$DATABASE_URL" | sed -E 's/:[^@:]*@/:****@/g')
          echo "================ DB CONNECTION INFO ================"
          echo "Connecting using DATABASE_URL: $SAFE_URL"
          echo "===================================================="
          
          # Conditionally add Cloud SQL instances flag if host=/cloudsql/ parameter is present in URL
          SQL_FLAG=""
          if [[ "$DATABASE_URL" == *"host=/cloudsql/"* ]]; then
            SQL_FLAG="--add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:us-central1:ecotrack-db"
            echo "Cloud SQL connection detected. Attaching SQL instance proxy."
          else
            echo "Direct connection (Supabase/TCP) detected. Skipping Cloud SQL proxy attachment."
          fi
          
          gcloud run deploy ecotrack-backend \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-backend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            $SQL_FLAG \
            --update-env-vars=NODE_ENV=production,DATABASE_URL="$DATABASE_URL",JWT_ACCESS_SECRET="$JWT_ACCESS_SECRET",JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET"

      - name: Deploy Frontend to Cloud Run
        run: |
          BACKEND_URL=$(gcloud run services describe ecotrack-backend --region=us-central1 --format="value(status.url)")
          gcloud run deploy ecotrack-frontend \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ecotrack-repo/ecotrack-frontend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --update-env-vars=BACKEND_URL=$BACKEND_URL
      - name: Verify Google Authentication 
        run: |
         gcloud auth list 
         gcloud config list project
